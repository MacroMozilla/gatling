name: Run Unit Tests ♻

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - '.github/**'
      - 'gatling/**'
      - 'tests/**'
      - 'requirements.txt'
  pull_request:
    branches: [ master ]
    paths:
      - '.github/**'
      - 'gatling/**'
      - 'tests/**'
      - 'requirements.txt'


permissions:
  actions: write
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete ALL workflow runs in this repository
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.DELETE_ACTION_RUN_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0                # Default is 30 days; must be 0 to delete ALL runs
          keep_minimum_runs: 0          # Do not keep any runs
          delete_workflow_pattern: "${{ github.workflow }}"
          delete_workflow_by_state_pattern: "ALL"
          delete_run_by_conclusion_pattern: "ALL"
          dry_run: false

  unittests:
    env:
      PYTHONIOENCODING: utf-8
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    needs: [ cleanup ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests (excluding PostgreSQL tests)
        run: |
          python -m unittest discover -s tests -v --pattern "test_*.py" --top-level-directory .
        env:
          SKIP_PGSQL_TESTS: "1"
          PYTHONPATH: tests

  pgsql-tests:
    env:
      PYTHONIOENCODING: utf-8
    runs-on: ubuntu-latest
    needs: [ cleanup ]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PostgreSQL Tests
        env:
          PGSQL_CONNINFO: "postgresql://admin:pass@localhost:5432/test"
          PYTHONPATH: tests
        run: |
          python -m unittest discover -s tests/storage/g_table/sql -v -t .
