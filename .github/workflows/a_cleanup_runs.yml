name: Cleanup Runs ✋

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete ALL workflow runs in this repository
        env:
          GH_TOKEN: ${{ secrets.DELETE_ACTION_RUN_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          echo "Deleting all workflow runs for $REPO..."
          gh run list --repo "$REPO" --limit 200 --json databaseId -q '.[].databaseId' | \
            xargs -I {} gh run delete {} --repo "$REPO" 2>/dev/null || true
          echo "Done."
