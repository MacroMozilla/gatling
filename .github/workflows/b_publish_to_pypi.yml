name: Publish To PYPI ✋

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs for this workflow
        env:
          GH_TOKEN: ${{ secrets.DELETE_ACTION_RUN_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW="${{ github.workflow }}"
          gh run list --repo "$REPO" --workflow "$WORKFLOW" --limit 200 --json databaseId -q '.[].databaseId' | \
            xargs -I {} gh run delete {} --repo "$REPO" 2>/dev/null || true

  publish:
    runs-on: ubuntu-latest
    needs: [ cleanup ]
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.9"

      - name: Fix requirements.txt Encoding
        run: |
          sed -i '1s/^\xEF\xBB\xBF//' "$GITHUB_WORKSPACE/requirements.txt"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
